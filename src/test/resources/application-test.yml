server:
  shutdown: immediate

spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/datamart
    username: test
    password: test
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: Pool-One
    # only have driver-class-name here because we dont want to intialise the missingreport stuff generally
    missingreport:
      driver-class-name: org.postgresql.Driver

  flyway:
    enabled: false

  security:
    oauth2:
      client:
        registration:
          DPR_LIB_API:
            provider: hmpps-auth
            client-id: ${dpr.lib.api.client.id}
            client-secret: ${dpr.lib.api.client.secret}
            authorization-grant-type: client_credentials
        provider:
          hmpps-auth:
            token-uri: ${hmpps.auth.url}/oauth/token
      resourceserver:
        jwt:
          jwk-set-uri: ${hmpps.auth.url}/.well-known/jwks.json

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

dpr:
  lib:
    hasProbationDatasources: false
    caseloads:
      host: http://localhost:9999
    manage-users:
      host: http://localhost:8082
    user:
      role: ROLE_PRISONS_REPORTING_USER
      requiredAuthSources: NOMIS,DELIUS
    system:
      role: PRISONS_REPORTING_USER
      token:
        enabled: true
    aws:
      sts:
        enabled: true
hmpps:
  auth:
    url: http://localhost:8090/auth

logging:
  level:
    org:
      springframework:
        jdbc:
          core:
            StatementCreatorUtils: TRACE
            JdbcTemplate: DEBUG

    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    uk.gov.justice.digital.hmpps.digitalprisonreportinglib: debug
