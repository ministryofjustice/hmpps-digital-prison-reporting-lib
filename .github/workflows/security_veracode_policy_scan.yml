name: Security veracode policy scan
on:
  workflow_dispatch:
  schedule:
    - cron: "34 6 * * 1" # Every Monday

jobs:
  create-artifact:
    name: Build the artifact for veracode to scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/gradle_verify.yml@607c82f9fa98d1c35286644d7d70f13c50c4316b
    with:
      gradle-command: "BUILD_NUMBER=veracode ./gradlew assemble"
      upload-build-artifacts: true
      build-artifact-name: "build-results"
      upload-test-artifacts: false
      java-version: "21"
    permissions:
      contents: read
      actions: read
  security-veracode-policy-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security veracode policy scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_policy_scan.yml@607c82f9fa98d1c35286644d7d70f13c50c4316b
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      veracode_package_artifact_name: "build-results"
      veracode_artifact_name: "${{ github.event.repository.name }}-veracode-plain.jar"
    secrets: inherit
    needs: create-artifact
