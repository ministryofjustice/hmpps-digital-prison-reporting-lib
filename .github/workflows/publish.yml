name: Publish

on:
  workflow_dispatch:
    inputs:
      versionType:
        description: "The semantic version segment to increment"
        required: true
        default: feature
        type: choice
        options:
          - major
          - feature
          - bug
          - alpha

jobs:
  publish-package:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          java-version: "21"
          distribution: "corretto"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@a8f75513eafdebd8141bd1cd4e30fcd194af8dfa

      - name: Get version
        id: get-version
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          CURRENT_VERSION=$(curl -s --request GET https://repo1.maven.org/maven2/uk/gov/justice/service/hmpps/hmpps-digital-prison-reporting-lib/maven-metadata.xml | grep -oP '(?<=<version>)[^<]+' | grep -v -e '2024-02-27' -e '2024-02-28' | tail -n1)
          echo "Current version: $CURRENT_VERSION"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump-version
        shell: bash
        run: |
          VERSION="${{ steps.get-version.outputs.current_version }}"
          TYPE="${{ inputs.versionType }}"

          if [[ -z "$VERSION" ]]; then
            echo "Failed to determine current version"
            exit 1
          fi

          echo "Current version: $VERSION"
          echo "Bump type: $TYPE"

          BASE_VERSION="${VERSION%%-*}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          case "$TYPE" in
            major)
              MAJOR=$((MAJOR+1))
              MINOR=0
              PATCH=0
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
              ;;
            feature)
              MINOR=$((MINOR+1))
              PATCH=0
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
              ;;
            bug)
              PATCH=$((PATCH+1))
              NEW_VERSION="$MAJOR.$MINOR.$PATCH"
              ;;
            alpha)
              if [[ "$VERSION" == *"-alpha."* ]]; then
                ALPHA_NUM=$(echo "$VERSION" | sed -n 's/.*alpha\.\([0-9]\+\).*/\1/p')
                ALPHA_NUM=$((ALPHA_NUM+1))
              else
                ALPHA_NUM=1
              fi
              NEW_VERSION="$BASE_VERSION-alpha.$ALPHA_NUM"
              ;;
            *)
              echo "Unknown version type: $TYPE"
              exit 1
              ;;
          esac

          echo "Next version: $NEW_VERSION"
          echo "next-version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to Sonatype
        id: publish-to-sonatype
        env:
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGPASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGKEY }}
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          ORG_GRADLE_PROJECT_signingKey=$(echo -e "$ORG_GRADLE_PROJECT_signingKey")
          ./gradlew -PpublishVersion=${{ steps.bump-version.outputs.next-version }} publishToSonatype closeAndReleaseSonatypeStagingRepository

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          PR_MESSAGE=$(git log -1 --pretty=format:"%s")
          git tag -a "${{ steps.bump-version.outputs.next-version }}" -m "${{ inputs.versionType }}-level version bump: $PR_MESSAGE"
          git push origin "${{ steps.bump-version.outputs.next-version }}"
